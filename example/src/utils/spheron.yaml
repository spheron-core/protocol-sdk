version: "2.0"

services:
  py-cuda:
    image: quay.io/jupyter/pytorch-notebook:cuda12-pytorch-2.4.1
    port_policy:
      - port: 8888
        as: 8888
        to:
          - global: true
    env:
      - JUPYTER_TOKEN=sentient
    resources:
      cpu:
        units: 8
      memory:
        size: 16Gi
      storage:
        - size: 200Gi
      gpu:
        units: 1
        attributes:
          vendor:
            nvidia:
              - model: rtx4090
    price:
      token: SPON
      amount: 10
    replica: 1

deployment:
  duration: 2h
  mode: provider
  tier:
    - community
  attributes:
    region: us-central